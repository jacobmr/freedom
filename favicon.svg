<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Paul Revere on horseback raising a lantern">
  <rect width="64" height="64" rx="14" fill="#bd2f2f"/>
  <g fill="none" stroke="#f7efe0" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Galloping legs (front reaching forward-left, hind reaching back-right) -->
    <path d="M22 39 L14 52"/>
    <path d="M27 40 L22 53"/>
    <path d="M41 40 L50 52"/>
    <path d="M45 39 L52 50"/>
  </g>
  <g fill="#f7efe0" stroke="#f7efe0" stroke-width="1" stroke-linejoin="round">
    <!-- Horse body -->
    <ellipse cx="33" cy="37" rx="14" ry="7"/>
    <!-- Arched neck rising to the head (left) -->
    <path d="M22 34 C19 28 17 24 15 21 L20 20 C22 25 24 30 27 34 Z"/>
    <!-- Head + muzzle + ear -->
    <path d="M15 21 L11 20 L13 25 L17 25 Z"/>
    <path d="M18 18 L20 14 L22 19 Z"/>
    <!-- Flowing tail -->
    <path d="M46 33 C51 35 53 41 51 47 C50 42 48 38 44 37 Z" stroke="none"/>
  </g>
  <g fill="#f7efe0">
    <!-- Rider torso seated in the saddle -->
    <path d="M31 32 C30 27 31 23 34 21 C37 22 38 26 37 31 C35 32 33 32 31 32 Z"/>
    <!-- Rider head -->
    <circle cx="35" cy="17" r="3.2"/>
  </g>
  <g fill="none" stroke="#f7efe0" stroke-width="2.6" stroke-linecap="round">
    <!-- Raised arm holding the lantern aloft -->
    <path d="M36 23 L45 14"/>
  </g>
  <!-- Lantern (the alarm signal) -->
  <rect x="43" y="9" width="5" height="6" rx="1.2" fill="#f7efe0"/>
</svg>
